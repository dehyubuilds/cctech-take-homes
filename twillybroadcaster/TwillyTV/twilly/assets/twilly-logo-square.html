<!DOCTYPE html>
<html>
<head>
    <title>Twilly Logo - Square Version</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .logo-container {
            width: 512px;
            height: 512px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 40px;
        }
        
        .play-icon {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #14B8A6, #06B6A6);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 30px;
            flex-shrink: 0;
        }
        
        .play-triangle {
            width: 0;
            height: 0;
            border-left: 35px solid #000;
            border-top: 25px solid transparent;
            border-bottom: 25px solid transparent;
            margin-left: 8px;
        }
        
        .text-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            flex: 1;
        }
        
        .main-text {
            font-size: 64px;
            font-weight: 900;
            background: linear-gradient(135deg, #14B8A6, #06B6A6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
        }
        
        .sub-text {
            font-size: 24px;
            color: #14B8A6;
            margin: 12px 0 0 0;
            font-weight: 500;
            opacity: 0.9;
        }
        
        /* Ensure the logo is centered and properly sized */
        .logo-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="play-icon">
            <div class="play-triangle"></div>
        </div>
        <div class="text-container">
            <h1 class="main-text">Twilly</h1>
            <p class="sub-text">Streaming Network</p>
        </div>
    </div>
</body>
</html>
