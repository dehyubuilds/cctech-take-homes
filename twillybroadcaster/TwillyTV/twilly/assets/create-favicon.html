<!DOCTYPE html>
<html>
<head>
    <title>Twilly Favicon Generator</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .favicon-container {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #14B8A6, #06B6A6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .stream-bars {
            display: flex;
            align-items: flex-end;
            gap: 0.5px;
            height: 16px;
        }
        .bar {
            width: 2px;
            background: #000;
            border-radius: 1px;
            animation: stream-pulse 1.5s ease-in-out infinite;
        }
        .bar-1 {
            height: 3px;
            animation-delay: 0s;
        }
        .bar-2 {
            height: 5px;
            animation-delay: 0.1s;
        }
        .bar-3 {
            height: 7px;
            animation-delay: 0.2s;
        }
        .bar-4 {
            height: 4px;
            animation-delay: 0.3s;
        }
        .bar-5 {
            height: 3.5px;
            animation-delay: 0.4s;
        }
        .bar-6 {
            height: 6px;
            animation-delay: 0.5s;
        }
        .bar-7 {
            height: 2px;
            animation-delay: 0.6s;
        }
        .bar-8 {
            height: 6.5px;
            animation-delay: 0.7s;
        }
        .bar-9 {
            height: 3px;
            animation-delay: 0.8s;
        }
        @keyframes stream-pulse {
            0%, 100% {
                transform: scaleY(0.3);
                opacity: 0.7;
            }
            50% {
                transform: scaleY(1);
                opacity: 1;
            }
        }
        .instructions {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="instructions">
        <strong>Favicon Instructions:</strong><br>
        1. Right-click on the favicon below<br>
        2. Select "Save Image As..."<br>
        3. Save as "favicon.ico"<br>
        4. Place in public/ folder
    </div>
    
    <div class="favicon-container">
        <div class="stream-bars">
            <div class="bar bar-1"></div>
            <div class="bar bar-2"></div>
            <div class="bar bar-3"></div>
            <div class="bar bar-4"></div>
            <div class="bar bar-5"></div>
            <div class="bar bar-6"></div>
            <div class="bar bar-7"></div>
            <div class="bar bar-8"></div>
            <div class="bar bar-9"></div>
        </div>
    </div>
</body>
</html>
