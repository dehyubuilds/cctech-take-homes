<!DOCTYPE html>
<html>
<head>
    <title>Twilly Square Logo Generator</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .logo-container {
            width: 512px;
            height: 512px;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 2px solid #333;
        }
        .stream-icon {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #14B8A6, #06B6A6);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(20, 184, 166, 0.3);
            position: relative;
            overflow: hidden;
        }
        .stream-bars {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 50px;
        }
        .bar {
            width: 8px;
            background: #000;
            border-radius: 2px;
            animation: stream-pulse 1.5s ease-in-out infinite;
        }
        .bar-1 {
            height: 20px;
            animation-delay: 0s;
        }
        .bar-2 {
            height: 35px;
            animation-delay: 0.1s;
        }
        .bar-3 {
            height: 50px;
            animation-delay: 0.2s;
        }
        .bar-4 {
            height: 30px;
            animation-delay: 0.3s;
        }
        .bar-5 {
            height: 25px;
            animation-delay: 0.4s;
        }
        .bar-6 {
            height: 40px;
            animation-delay: 0.5s;
        }
        .bar-7 {
            height: 15px;
            animation-delay: 0.6s;
        }
        .bar-8 {
            height: 45px;
            animation-delay: 0.7s;
        }
        .bar-9 {
            height: 20px;
            animation-delay: 0.8s;
        }
        @keyframes stream-pulse {
            0%, 100% {
                transform: scaleY(0.3);
                opacity: 0.7;
            }
            50% {
                transform: scaleY(1);
                opacity: 1;
            }
        }
        .main-text {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 64px;
            font-weight: 900;
            background: linear-gradient(135deg, #14B8A6, #06B6A6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            line-height: 1;
            letter-spacing: -3px;
            text-align: center;
        }
        .sub-text {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 20px;
            color: #14B8A6;
            margin: 15px 0 0 0;
            font-weight: 500;
            opacity: 0.8;
            text-align: center;
        }
        .instructions {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="instructions">
        <strong>Instructions:</strong><br>
        1. Right-click on the logo below<br>
        2. Select "Save Image As..."<br>
        3. Save as "twilly-logo-square.png"<br>
        4. Replace the file in public/assets/
    </div>
    
    <div class="logo-container">
        <div class="stream-icon">
            <div class="stream-bars">
                <div class="bar bar-1"></div>
                <div class="bar bar-2"></div>
                <div class="bar bar-3"></div>
                <div class="bar bar-4"></div>
                <div class="bar bar-5"></div>
                <div class="bar bar-6"></div>
                <div class="bar bar-7"></div>
                <div class="bar bar-8"></div>
                <div class="bar bar-9"></div>
            </div>
        </div>
        <h1 class="main-text">Twilly</h1>
    </div>
</body>
</html>
