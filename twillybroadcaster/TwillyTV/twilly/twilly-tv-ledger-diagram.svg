<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #ffffff; }
      .subtitle { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #14b8a6; }
      .text { font-family: Arial, sans-serif; font-size: 12px; fill: #ffffff; }
      .small-text { font-family: Arial, sans-serif; font-size: 10px; fill: #94a3b8; }
      .box { fill: #1e293b; stroke: #14b8a6; stroke-width: 2; rx: 8; }
      .box-highlight { fill: #0f172a; stroke: #14b8a6; stroke-width: 3; rx: 8; }
      .arrow { stroke: #14b8a6; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .revenue-box { fill: #059669; stroke: #10b981; stroke-width: 2; rx: 8; }
      .collaborator-box { fill: #7c3aed; stroke: #a855f7; stroke-width: 2; rx: 8; }
      .ledger-box { fill: #dc2626; stroke: #ef4444; stroke-width: 2; rx: 8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#14b8a6" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Twilly TV Ledger System</text>
  
  <!-- Channel Setup -->
  <rect x="50" y="60" width="120" height="80" class="box"/>
  <text x="110" y="85" text-anchor="middle" class="subtitle">Channel Setup</text>
  <text x="110" y="100" text-anchor="middle" class="text">Twilly TV</text>
  <text x="110" y="115" text-anchor="middle" class="text">$30/month</text>
  <text x="110" y="130" text-anchor="middle" class="small-text">Producer + 3 Collaborators</text>
  
  <!-- Content Creation -->
  <rect x="220" y="60" width="120" height="80" class="box"/>
  <text x="280" y="85" text-anchor="middle" class="subtitle">Content Creation</text>
  <text x="280" y="100" text-anchor="middle" class="text">Weekly Episodes</text>
  <text x="280" y="115" text-anchor="middle" class="text">3 Episodes/Week</text>
  <text x="280" y="130" text-anchor="middle" class="small-text">Alex, Sarah, Mike</text>
  
  <!-- Episode Airing -->
  <rect x="390" y="60" width="120" height="80" class="box"/>
  <text x="450" y="85" text-anchor="middle" class="subtitle">Episode Airing</text>
  <text x="450" y="100" text-anchor="middle" class="text">Visibility Tracking</text>
  <text x="450" y="115" text-anchor="middle" class="text">Scheduled/Manual</text>
  <text x="450" y="130" text-anchor="middle" class="small-text">Ledger Entry Created</text>
  
  <!-- Weekly Revenue -->
  <rect x="560" y="60" width="120" height="80" class="revenue-box"/>
  <text x="620" y="85" text-anchor="middle" class="subtitle">Weekly Revenue</text>
  <text x="620" y="100" text-anchor="middle" class="text">150 Subscribers</text>
  <text x="620" y="115" text-anchor="middle" class="text">$4,500 Total</text>
  <text x="620" y="130" text-anchor="middle" class="small-text">Attribution Window: 7 days</text>
  
  <!-- Arrows -->
  <line x1="170" y1="100" x2="220" y2="100" class="arrow"/>
  <line x1="340" y1="100" x2="390" y2="100" class="arrow"/>
  <line x1="510" y1="100" x2="560" y2="100" class="arrow"/>
  
  <!-- Revenue Split Section -->
  <rect x="50" y="200" width="700" height="120" class="box-highlight"/>
  <text x="400" y="220" text-anchor="middle" class="subtitle">Revenue Distribution</text>
  
  <!-- Platform -->
  <rect x="70" y="230" width="100" height="70" class="box"/>
  <text x="120" y="250" text-anchor="middle" class="text">Platform</text>
  <text x="120" y="265" text-anchor="middle" class="subtitle">10%</text>
  <text x="120" y="280" text-anchor="middle" class="text">$450.00</text>
  
  <!-- Producer -->
  <rect x="190" y="230" width="100" height="70" class="revenue-box"/>
  <text x="240" y="250" text-anchor="middle" class="text">Producer</text>
  <text x="240" y="265" text-anchor="middle" class="subtitle">70%</text>
  <text x="240" y="280" text-anchor="middle" class="text">$3,150.00</text>
  
  <!-- Collaborators -->
  <rect x="310" y="230" width="100" height="70" class="collaborator-box"/>
  <text x="360" y="250" text-anchor="middle" class="text">Collaborators</text>
  <text x="360" y="265" text-anchor="middle" class="subtitle">15%</text>
  <text x="360" y="280" text-anchor="middle" class="text">$675.00</text>
  
  <!-- Affiliates -->
  <rect x="430" y="230" width="100" height="70" class="box"/>
  <text x="480" y="250" text-anchor="middle" class="text">Affiliates</text>
  <text x="480" y="265" text-anchor="middle" class="subtitle">5%</text>
  <text x="480" y="280" text-anchor="middle" class="text">$225.00</text>
  
  <!-- Ledger System -->
  <rect x="550" y="230" width="100" height="70" class="ledger-box"/>
  <text x="600" y="250" text-anchor="middle" class="text">Ledger</text>
  <text x="600" y="265" text-anchor="middle" class="subtitle">Tracking</text>
  <text x="600" y="280" text-anchor="middle" class="text">All Transactions</text>
  
  <!-- Collaborator Details -->
  <rect x="50" y="350" width="700" height="200" class="box"/>
  <text x="400" y="370" text-anchor="middle" class="subtitle">Weekly Collaborator Attribution</text>
  
  <!-- Alex -->
  <rect x="70" y="380" width="150" height="80" class="collaborator-box"/>
  <text x="145" y="400" text-anchor="middle" class="text">Alex Chen</text>
  <text x="145" y="415" text-anchor="middle" class="text">Security Expert</text>
  <text x="145" y="430" text-anchor="middle" class="text">Episodes: 2</text>
  <text x="145" y="445" text-anchor="middle" class="text">Earnings: $225.00</text>
  
  <!-- Sarah -->
  <rect x="240" y="380" width="150" height="80" class="collaborator-box"/>
  <text x="315" y="400" text-anchor="middle" class="text">Sarah Martinez</text>
  <text x="315" y="415" text-anchor="middle" class="text">Content Producer</text>
  <text x="315" y="430" text-anchor="middle" class="text">Episodes: 1</text>
  <text x="315" y="445" text-anchor="middle" class="text">Earnings: $225.00</text>
  
  <!-- Mike -->
  <rect x="410" y="380" width="150" height="80" class="collaborator-box"/>
  <text x="485" y="400" text-anchor="middle" class="text">Mike Johnson</text>
  <text x="485" y="415" text-anchor="middle" class="text">Infrastructure Expert</text>
  <text x="485" y="430" text-anchor="middle" class="text">Episodes: 1</text>
  <text x="485" y="445" text-anchor="middle" class="text">Earnings: $225.00</text>
  
  <!-- Ledger Entry Example -->
  <rect x="580" y="380" width="150" height="80" class="ledger-box"/>
  <text x="655" y="400" text-anchor="middle" class="text">Ledger Entry</text>
  <text x="655" y="415" text-anchor="middle" class="text">ID: ep-aired-001</text>
  <text x="655" y="430" text-anchor="middle" class="text">Event: EPISODE_AIRED</text>
  <text x="655" y="445" text-anchor="middle" class="text">Status: CONFIRMED</text>
  
  <!-- Bottom Text -->
  <text x="400" y="580" text-anchor="middle" class="text">Blockchain-Style Immutable Ledger for Fair Revenue Attribution</text>
</svg>
