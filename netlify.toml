# Twilly.app: Nuxt app lives in twillybroadcaster/TwillyTV/twilly (repo root has no package.json)
[build]
  base = "twillybroadcaster/TwillyTV/twilly"
  command = "npm run build"
  # Publish path from repo root so deploy finds build output
  publish = "twillybroadcaster/TwillyTV/twilly/.output/public"
