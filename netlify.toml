# Twilly.app: Nuxt app lives in twillybroadcaster/TwillyTV/twilly (repo root has no package.json)
[build]
  base = "twillybroadcaster/TwillyTV/twilly"
  command = "npm run build"
  publish = ".output/public"
  # Force build every time (exit 1 = do not skip). Stops Netlify from skipping build and then failing deploy.
  ignore = "exit 1"
